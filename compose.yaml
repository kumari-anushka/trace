services:

  postgres:
    image: postgres:17
    container_name: trace-postgres
    environment:
      POSTGRES_DB: trace
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data


  redis:
    image: redis:8
    container_name: trace-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data


  backend:
    build:
      context: ./backend
    container_name: trace-backend
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/trace
      REDIS_URL: redis://redis:6379
    depends_on:
      - postgres
      - redis


  frontend:
    build:
      context: ./frontend
    container_name: trace-frontend
    ports:
      - "5173:5173"
    depends_on:
      - backend


volumes:
  postgres_data:
  redis_data: