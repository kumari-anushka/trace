services:
  postgres:
    image: postgres:17
    container_name: trace-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - trace_postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:8
    container_name: trace-redis
    ports:
      - "6379:6379"
    volumes:
      - trace_redis_data:/data

  backend:
    build:
      context: ./backend
    container_name: trace-backend
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      REDIS_URL: redis://redis:6379/0
      CORS_ORIGINS: '["http://localhost:5173"]'
    volumes:
      - ./backend:/app
      - /app/.venv
    depends_on:
      - postgres
      - redis

  frontend:
    build:
      context: ./frontend
    container_name: trace-frontend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend

volumes:
  trace_postgres_data:
    name: trace_postgres_data

  trace_redis_data:
    name: trace_redis_data
