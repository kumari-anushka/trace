name: GitHub CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    name: Backend checks
    runs-on: ubuntu-latest
    timeout-minutes: 10

    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v6

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - run: uv sync --frozen

      - run: uv run ruff format --check .

      - run: uv run ruff check .

      - run: uv run mypy .

      - run: uv run pytest

  frontend:
    name: Frontend checks
    runs-on: ubuntu-latest
    timeout-minutes: 10

    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - run: npm ci

      - run: npm run format:check

      - run: npm run lint

      - run: npm run build

  docker:
    name: Docker builds
    runs-on: ubuntu-latest
    timeout-minutes: 15

    env:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}

    steps:
      - uses: actions/checkout@v4

      - run: docker compose config

      - run: docker build -t trace-backend ./backend

      - run: docker build -t trace-frontend ./frontend
