repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.21
    hooks:
      - id: ruff-check
        args: [--fix]
        files: ^backend/

      - id: ruff-format
        files: ^backend/

  - repo: local
    hooks:
      - id: backend-mypy
        name: Backend mypy
        entry: bash -c 'cd backend && uv run mypy .'
        language: system
        pass_filenames: false
        files: ^backend/

      - id: frontend-format
        name: Frontend Prettier
        entry: npm --prefix frontend run format:check
        language: system
        pass_filenames: false
        files: ^frontend/

      - id: frontend-lint
        name: Frontend Oxlint
        entry: npm --prefix frontend run lint
        language: system
        pass_filenames: false
        files: ^frontend/
